<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Technique | SABRINA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --primary: #1E3A5F;
      --accent: #3B82F6;
      --bg: #0A0E1A;
      --surface: #151B2E;
      --text: #E2E8F0;
      --text-dim: #94A3B8;
      --border: rgba(59, 130, 246, 0.1);
      --success: #10B981;
      --warning: #F59E0B;
    }
    [data-theme="light"] {
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --text: #1E293B;
      --text-dim: #64748B;
      --border: rgba(30, 58, 95, 0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      background: rgba(21, 27, 46, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 100;
    }
    [data-theme="light"] header {
      background: rgba(255, 255, 255, 0.8);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .agent-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: float 3s ease-in-out infinite;
    }
    .agent-avatar::after {
      content: '';
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 12px;
      height: 12px;
      background: var(--success);
      border: 2px solid var(--surface);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    .agent-info h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 0.125rem;
    }
    .agent-status {
      font-size: 0.75rem;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .theme-toggle {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .theme-toggle:hover {
      transform: scale(1.1);
      background: var(--primary);
    }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .messages-container::-webkit-scrollbar { width: 8px; }
    .messages-container::-webkit-scrollbar-track { background: var(--bg); }
    .messages-container::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 4px;
    }
    .message {
      display: flex;
      gap: 0.75rem;
      max-width: 80%;
      animation: fadeInUp 0.4s ease;
    }
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
    }
    .message.agent .message-avatar {
      background: linear-gradient(135deg, var(--primary), var(--accent));
    }
    .message.user .message-avatar {
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
    }
    .message-content {
      flex: 1;
    }
    .message-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 0.875rem 1.125rem;
      line-height: 1.6;
      position: relative;
    }
    .message.user .message-bubble {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none;
      color: white;
    }
    .message-time {
      font-size: 0.6875rem;
      color: var(--text-dim);
      margin-top: 0.375rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .typing-indicator {
      display: none;
      gap: 0.75rem;
      max-width: 80%;
      animation: fadeInUp 0.4s ease;
    }
    .typing-indicator.active { display: flex; }
    .typing-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1rem 1.25rem;
      display: flex;
      gap: 0.375rem;
    }
    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: typingDot 1.4s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    .input-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }
    .input-wrapper {
      flex: 1;
      position: relative;
    }
    #messageInput {
      width: 100%;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 1.5rem;
      padding: 0.875rem 1.25rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9375rem;
      resize: none;
      max-height: 120px;
      transition: all 0.3s ease;
    }
    #messageInput:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }
    .send-btn {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    .send-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
    }
    .send-btn:active { transform: scale(0.95); }
    .send-btn.loading {
      pointer-events: none;
      opacity: 0.6;
    }
    .send-btn svg { color: white; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes typingDot {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }
    @media (max-width: 768px) {
      .message { max-width: 90%; }
      header { padding: 1rem; }
      .messages-container { padding: 1rem; }
      .input-bar { padding: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="agent-avatar">
        <i data-lucide="headphones" style="color: white; width: 24px; height: 24px;"></i>
      </div>
      <div class="agent-info">
        <h1>Support Technique SABRINA</h1>
        <div class="agent-status">
          <i data-lucide="circle" style="width: 8px; height: 8px; color: var(--success);"></i>
          En ligne
        </div>
      </div>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">
      <i data-lucide="moon" style="width: 20px; height: 20px;"></i>
    </button>
  </header>
  <div class="messages-container" id="messagesContainer">
    <div class="message agent">
      <div class="message-avatar">
        <i data-lucide="bot" style="color: white; width: 18px; height: 18px;"></i>
      </div>
      <div class="message-content">
        <div class="message-bubble">
          Bonjour ! Je suis SABRINA, votre assistante technique. Comment puis-je vous aider aujourd'hui ?
        </div>
        <div class="message-time">
          <i data-lucide="clock" style="width: 10px; height: 10px;"></i>
          <span id="welcomeTime"></span>
        </div>
      </div>
    </div>
  </div>
  <div class="typing-indicator" id="typingIndicator">
    <div class="message-avatar" style="background: linear-gradient(135deg, var(--primary), var(--accent));">
      <i data-lucide="bot" style="color: white; width: 18px; height: 18px;"></i>
    </div>
    <div class="typing-bubble">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>
  </div>
  <div class="input-bar">
    <div class="input-wrapper">
      <textarea id="messageInput" placeholder="Décrivez votre problème technique..." rows="1"></textarea>
    </div>
    <button class="send-btn" onclick="sendMessage()">
      <i data-lucide="send" style="width: 20px; height: 20px;"></i>
    </button>
  </div>
  <script>
    const WEBHOOK_URL = 'https://n8n.srv1121126.hstgr.cloud/webhook/sabrina';
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const typingIndicator = document.getElementById('typingIndicator');
    
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      const icon = document.querySelector('.theme-toggle i');
      icon.setAttribute('data-lucide', newTheme === 'dark' ? 'moon' : 'sun');
      lucide.createIcons();
    }
    
    function formatTime() {
      const now = new Date();
      return now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }
    
    function addMessage(text, isUser = false) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'agent'}`;
      messageDiv.innerHTML = `
        <div class="message-avatar">
          <i data-lucide="${isUser ? 'user' : 'bot'}" style="color: white; width: 18px; height: 18px;"></i>
        </div>
        <div class="message-content">
          <div class="message-bubble">${text}</div>
          <div class="message-time">
            <i data-lucide="clock" style="width: 10px; height: 10px;"></i>
            ${formatTime()}
          </div>
        </div>
      `;
      messagesContainer.appendChild(messageDiv);
      lucide.createIcons();
      scrollToBottom();
    }
    
    function scrollToBottom() {
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;
      
      addMessage(message, true);
      messageInput.value = '';
      messageInput.style.height = 'auto';
      
      typingIndicator.classList.add('active');
      scrollToBottom();
      
      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userMessage: message,
            timestamp: new Date().toISOString(),
            source: 'SABRINA_SUPPORT'
          })
        });
        
        const data = await response.json();
        
        setTimeout(() => {
          typingIndicator.classList.remove('active');
          addMessage(data.response || "Message reçu ! Notre équipe technique vous répondra dans les plus brefs délais.");
        }, 1500);
      } catch (error) {
        typingIndicator.classList.remove('active');
        addMessage("Erreur de connexion. Veuillez réessayer.", false);
      }
    }
    
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    messageInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    
    document.getElementById('welcomeTime').textContent = formatTime();
    lucide.createIcons();
  </script>
</body>
</html>
