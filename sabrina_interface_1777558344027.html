<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Technique | SABRINA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --primary: #1E3A5F;
      --accent: #3B82F6;
      --bg: #0F1419;
      --surface: #1A1F2E;
      --text: #E8EAED;
      --text-secondary: #9CA3AF;
      --border: rgba(59, 130, 246, 0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
    }
    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
    }
    header {
      background: rgba(26, 31, 46, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
      z-index: 10;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #60A5FA);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    .status-dot {
      width: 12px;
      height: 12px;
      background: #10B981;
      border-radius: 50%;
      position: absolute;
      bottom: 2px;
      right: 2px;
      border: 2px solid var(--surface);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
    }
    .header-info h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .header-info p {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    .theme-toggle {
      margin-left: auto;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.625rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.05);
    }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .messages-container::-webkit-scrollbar {
      width: 6px;
    }
    .messages-container::-webkit-scrollbar-thumb {
      background: rgba(59, 130, 246, 0.3);
      border-radius: 3px;
    }
    .message {
      display: flex;
      gap: 0.75rem;
      animation: fadeInUp 0.4s ease;
      max-width: 85%;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      margin-left: auto;
      flex-direction: row-reverse;
    }
    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #60A5FA);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .message.user .message-avatar {
      background: linear-gradient(135deg, var(--primary), #2563EB);
    }
    .message-content {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.25rem;
      position: relative;
    }
    .message.user .message-content {
      background: linear-gradient(135deg, var(--accent), #2563EB);
      border: none;
    }
    .message-text {
      font-size: 0.9375rem;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }
    .message-time {
      font-size: 0.75rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }
    .message.user .message-time {
      color: rgba(255, 255, 255, 0.7);
    }
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 0.75rem;
      padding: 0 1.5rem;
      margin-bottom: 1rem;
    }
    .typing-indicator.active {
      display: flex;
    }
    .typing-dots {
      display: flex;
      gap: 0.375rem;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      border: 1px solid var(--border);
    }
    .dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }
    .input-bar {
      background: rgba(26, 31, 46, 0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .input-wrapper {
      flex: 1;
      position: relative;
    }
    #messageInput {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.875rem 1.125rem;
      color: var(--text);
      font-size: 0.9375rem;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    #messageInput:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    #messageInput::placeholder {
      color: var(--text-secondary);
    }
    .send-btn {
      background: linear-gradient(135deg, var(--accent), #2563EB);
      border: none;
      border-radius: 12px;
      padding: 0.875rem 1.25rem;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
    }
    .send-btn:active {
      transform: translateY(0);
    }
    .send-btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }
    .welcome-message {
      text-align: center;
      padding: 3rem 1.5rem;
      max-width: 500px;
      margin: 0 auto;
    }
    .welcome-message h2 {
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, var(--accent), #60A5FA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .welcome-message p {
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }
    .quick-action {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.625rem 1rem;
      font-size: 0.875rem;
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .quick-action:hover {
      background: rgba(59, 130, 246, 0.1);
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    [data-theme="light"] {
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --text: #1E293B;
      --text-secondary: #64748B;
      --border: rgba(30, 58, 95, 0.1);
    }
    @media (max-width: 768px) {
      header { padding: 1rem; }
      .messages-container { padding: 1.5rem 1rem; }
      .message { max-width: 90%; }
      .input-bar { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="avatar">
        <i data-lucide="headphones" style="color: white; width: 24px; height: 24px;"></i>
        <div class="status-dot"></div>
      </div>
      <div class="header-info">
        <h1>Support Technique</h1>
        <p>En ligne • Temps de réponse ~1 min</p>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()">
        <i data-lucide="sun" style="width: 20px; height: 20px; color: var(--text);"></i>
      </button>
    </header>

    <div class="messages-container" id="messagesContainer">
      <div class="welcome-message">
        <h2>Bienvenue sur le support SABRINA</h2>
        <p>Notre équipe est là pour vous aider avec vos questions techniques. Décrivez votre problème et nous vous répondrons rapidement.</p>
        <div class="quick-actions">
          <div class="quick-action" onclick="sendQuickMessage('Problème de connexion')">🔌 Problème de connexion</div>
          <div class="quick-action" onclick="sendQuickMessage('Erreur système')">⚠️ Erreur système</div>
          <div class="quick-action" onclick="sendQuickMessage('Question facturation')">💳 Facturation</div>
          <div class="quick-action" onclick="sendQuickMessage('Autre question')">💬 Autre</div>
        </div>
      </div>
    </div>

    <div class="typing-indicator" id="typingIndicator">
      <div class="message-avatar">
        <i data-lucide="bot" style="color: white; width: 18px; height: 18px;"></i>
      </div>
      <div class="typing-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrapper">
        <input type="text" id="messageInput" placeholder="Décrivez votre problème..." onkeypress="handleKeyPress(event)">
      </div>
      <button class="send-btn" onclick="sendMessage()">
        <span>Envoyer</span>
        <i data-lucide="send" style="width: 18px; height: 18px;"></i>
      </button>
    </div>
  </div>

  <script>
    const WEBHOOK_URL = 'https://n8n.srv1121126.hstgr.cloud/webhook/sabrina';
    lucide.createIcons();

    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
      lucide.createIcons();
    }

    function addMessage(text, isUser = false) {
      const container = document.getElementById('messagesContainer');
      const welcome = container.querySelector('.welcome-message');
      if (welcome) welcome.remove();

      const time = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      const message = document.createElement('div');
      message.className = `message ${isUser ? 'user' : ''}`;
      message.innerHTML = `
        <div class="message-avatar">
          <i data-lucide="${isUser ? 'user' : 'bot'}" style="color: white; width: 18px; height: 18px;"></i>
        </div>
        <div class="message-content">
          <div class="message-text">${text}</div>
          <div class="message-time">
            <i data-lucide="clock" style="width: 12px; height: 12px;"></i>
            ${time}
          </div>
        </div>
      `;
      container.appendChild(message);
      lucide.createIcons();
      container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
      document.getElementById('typingIndicator').classList.add('active');
    }

    function hideTyping() {
      document.getElementById('typingIndicator').classList.remove('active');
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, true);
      input.value = '';
      showTyping();

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userMessage: message,
            timestamp: new Date().toISOString(),
            source: 'SUPPORT_TECHNIQUE'
          })
        });

        const data = await response.json();
        setTimeout(() => {
          hideTyping();
          addMessage(data.reply || 'Message reçu ! Notre équipe traite votre demande.');
        }, 1500);
      } catch (error) {
        hideTyping();
        addMessage('Erreur de connexion. Veuillez réessayer.', false);
      }
    }

    function sendQuickMessage(msg) {
      document.getElementById('messageInput').value = msg;
      sendMessage();
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter') sendMessage();
    }
  </script>
</body>
</html>
