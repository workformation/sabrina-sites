<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SABRINA Chat | Interface Conversationnelle</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  
  <style>
    :root {
      --primary: #1E3A5F;
      --accent: #3B82F6;
      --bg-dark: #0A0E1A;
      --bg-darker: #060911;
      --surface: #141824;
      --surface-light: #1F2937;
      --text-primary: #F9FAFB;
      --text-secondary: #9CA3AF;
      --border: rgba(255, 255, 255, 0.1);
      --glow: rgba(59, 130, 246, 0.3);
      --success: #10B981;
      --warning: #F59E0B;
      --error: #EF4444;
    }

    [data-theme="light"] {
      --primary: #1E3A5F;
      --accent: #3B82F6;
      --bg-dark: #F9FAFB;
      --bg-darker: #FFFFFF;
      --surface: #FFFFFF;
      --surface-light: #F3F4F6;
      --text-primary: #111827;
      --text-secondary: #6B7280;
      --border: rgba(0, 0, 0, 0.1);
      --glow: rgba(59, 130, 246, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      overflow-x: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    header {
      background: rgba(20, 24, 36, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
      animation: slideDown 0.6s ease;
    }

    [data-theme="light"] header {
      background: rgba(255, 255, 255, 0.8);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .avatar-container {
      position: relative;
      width: 48px;
      height: 48px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.25rem;
      color: white;
      box-shadow: 0 4px 20px var(--glow);
      animation: float 3s ease-in-out infinite;
    }

    .status-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 14px;
      height: 14px;
      background: var(--success);
      border: 3px solid var(--surface);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    .header-info h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      color: var(--text-secondary);
    }

    .icon-btn:hover {
      background: var(--surface-light);
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--glow);
    }

    .theme-toggle {
      position: relative;
      width: 60px;
      height: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .theme-toggle::before {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 50%;
      top: 3px;
      left: 4px;
      transition: transform 0.3s ease;
      box-shadow: 0 2px 8px var(--glow);
    }

    [data-theme="light"] .theme-toggle::before {
      transform: translateX(28px);
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      scroll-behavior: smooth;
    }

    .messages-container::-webkit-scrollbar {
      width: 8px;
    }

    .messages-container::-webkit-scrollbar-track {
      background: var(--surface);
      border-radius: 4px;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 4px;
    }

    .message {
      display: flex;
      gap: 1rem;
      animation: fadeInUp 0.5s ease;
      max-width: 800px;
    }

    .message.user {
      flex-direction: row-reverse;
      margin-left: auto;
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 2px 12px var(--glow);
    }

    .message.user .message-avatar {
      background: linear-gradient(135deg, var(--accent), #10B981);
    }

    .message-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .message-name {
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--text-primary);
    }

    .message-time {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .message-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.25rem;
      font-size: 0.9375rem;
      line-height: 1.6;
      color: var(--text-primary);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    .message.user .message-bubble {
      background: linear-gradient(135deg, var(--accent), var(--primary));
      color: white;
      border: none;
    }

    .message-bubble:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    .typing-indicator {
      display: none;
      align-items: center;
      gap: 1rem;
      padding: 0 2rem;
      margin-bottom: 1rem;
      animation: fadeIn 0.3s ease;
    }

    .typing-indicator.active {
      display: flex;
    }

    .typing-dots {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.5rem;
      display: flex;
      gap: 0.5rem;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: typingDot 1.4s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    .input-bar {
      padding: 1.5rem 2rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      animation: slideUp 0.6s ease;
    }

    .input-wrapper {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      gap: 1rem;
      align-items: flex-end;
    }

    .input-container {
      flex: 1;
      position: relative;
    }

    .message-input {
      width: 100%;
      background: var(--bg-dark);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 1rem 3.5rem 1rem 1.25rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9375rem;
      color: var(--text-primary);
      resize: none;
      max-height: 150px;
      transition: all 0.3s ease;
      line-height: 1.5;
    }

    .message-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--glow);
    }

    .message-input::placeholder {
      color: var(--text-secondary);
    }

    .input-actions {
      position: absolute;
      right: 0.75rem;
      bottom: 0.75rem;
      display: flex;
      gap: 0.5rem;
    }

    .input-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: transparent;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.3s ease;
    }

    .input-btn:hover {
      background: var(--surface-light);
      color: var(--accent);
      transform: scale(1.1);
    }

    .send-btn {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--primary));
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px var(--glow);
      flex-shrink: 0;
    }

    .send-btn:hover:not(.loading) {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 8px 24px var(--glow);
    }

    .send-btn:active:not(.loading) {
      transform: translateY(0) scale(0.95);
    }

    .send-btn.loading {
      pointer-events: none;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .quick-actions {
      max-width: 1000px;
      margin: 0 auto 1rem;
      padding: 0 2rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      animation: fadeIn 0.6s ease 0.3s backwards;
    }

    .quick-chip {
      padding: 0.625rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      font-size: 0.875rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .quick-chip:hover {
      background: var(--surface-light);
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--glow);
    }

    .notification {
      position: fixed;
      top: 100px;
      right: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      z-index: 2000;
      animation: slideInRight 0.4s ease;
      opacity: 0;
      pointer-events: none;
    }

    .notification.show {
      opacity: 1;
      pointer-events: auto;
    }

    .notification.success {
      border-left: 4px solid var(--success);
    }

    .notification.error {
      border-left: 4px solid var(--error);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-5px);
      }
    }

    @keyframes typingDot {
      0%, 60%, 100% {
        transform: translateY(0);
        opacity: 0.5;
      }
      30% {
        transform: translateY(-10px);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      header {
        padding: 1rem 1.25rem;
      }

      .header-info h1 {
        font-size: 1.25rem;
      }

      .messages-container {
        padding: 1rem;
        gap: 1rem;
      }

      .message {
        max-width: 100%;
      }

      .message-bubble {
        padding: 0.875rem 1rem;
        font-size: 0.875rem;
      }

      .input-bar {
        padding: 1rem;
      }

      .quick-actions {
        padding: 0 1rem;
      }

      .send-btn {
        width: 48px;
        height: 48px;
      }

      .notification {
        right: 1rem;
        left: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="avatar-container">
          <div class="avatar">S</div>
          <div class="status-dot"></div>
        </div>
        <div class="header-info">
          <h1>SABRINA</h1>
          <div class="header-status">
            <i data-lucide="circle" style="width: 8px; height: 8px;"></i>
            <span>En ligne</span>
          </div>
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="searchBtn">
          <i data-lucide="search" style="width: 20px; height: 20px;"></i>
        </button>
        <button class="icon-btn" id="notificationBtn">
          <i data-lucide="bell" style="width: 20px; height: 20px;"></i>
        </button>
        <div class="theme-toggle" id="themeToggle"></div>
      </div>
    </header>

    <div class="messages-container" id="messagesContainer">
      <div class="message">
        <div class="message-avatar">S</div>
        <div class="message-content">
          <div class="message-header">
            <span class="message-name">SABRINA</span>
            <span class="message-time">Maintenant</span>
          </div>
          <div class="message-bubble">
            Bonjour ! Je suis SABRINA, votre assistante intelligente. Comment puis-je vous aider aujourd'hui ?
          </div>
        </div>
      </div>
    </div>

    <div class="quick-actions">
      <button class="quick-chip" data-message="Aide-moi à organiser mon emploi du temps">
        <i data-lucide="calendar" style="width: 16px; height: 16px;"></i>
        Organiser mon temps
      </button>
      <button class="quick-chip" data-message="Donne-moi des idées créatives">
        <i data-lucide="lightbulb" style="width: 16px; height: 16px;"></i>
        Idées créatives
      </button>
      <button class="quick-chip" data-message="Résume les dernières actualités">
        <i data-lucide="newspaper" style="width: 16px; height: 16px;"></i>
        Actualités
      </button>
      <button class="quick-chip" data-message="Aide-moi à apprendre quelque chose de nouveau">
        <i data-lucide="book-open" style="width: 16px; height: 16px;"></i>
        Apprentissage
      </button>
    </div>

    <div class="typing-indicator" id="typingIndicator">
      <div class="message-avatar">S</div>
      <div class="typing-dots">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrapper">
        <div class="input-container">
          <textarea 
            class="message-input" 
            id="messageInput" 
            placeholder="Écrivez votre message..."
            rows="1"
          ></textarea>
          <div class="input-actions">
            <button class="input-btn" id="attachBtn">
              <i data-lucide="paperclip" style="width: 18px; height: 18px;"></i>
            </button>
            <button class="input-btn" id="emojiBtn">
              <i data-lucide="smile" style="width: 18px; height: 18px;"></i>
            </button>
          </div>
        </div>
        <button class="send-btn" id="sendBtn">
          <i data-lucide="send" style="width: 24px; height: 24px;"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="notification" id="notification">
    <i data-lucide="check-circle" style="width: 20px; height: 20px;"></i>
    <span id="notificationText">Message envoyé</span>
  </div>

  <script>
    const WEBHOOK_URL = 'https://n8n.srv1121126.hstgr.cloud/webhook/sabrina';
    
    const state = {
      messages: [],
      theme: localStorage.getItem('theme') || 'dark',
      isTyping: false
    };

    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const messagesContainer = document.getElementById('messagesContainer');
    const typingIndicator = document.getElementById('typingIndicator');
    const themeToggle = document.getElementById('themeToggle');
    const notification = document.getElementById('notification');
    const notificationText = document.getElementById('notificationText');

    function initTheme() {
      document.documentElement.setAttribute('data-theme', state.theme);
    }

    function toggleTheme() {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', state.theme);
      localStorage.setItem('theme', state.theme);
      showNotification('Thème ' + (state.theme === 'dark' ? 'sombre' : 'clair') + ' activé', 'success');
    }

    function formatTime() {
      const now = new Date();
      return now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }

    function createMessage(text, isUser = false) {
      const message = document.createElement('div');
      message.className = 'message' + (isUser ? ' user' : '');
      
      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = isUser ? 'U' : 'S';
      
      const content = document.createElement('div');
      content.className = 'message-content';
      
      const header = document.createElement('div');
      header.className = 'message-header';
      
      const name = document.createElement('span');
      name.className = 'message-name';
      name.textContent = isUser ? 'Vous' : 'SABRINA';
      
      const time = document.createElement('span');
      time.className = 'message-time';
      time.textContent = formatTime();
      
      header.appendChild(name);
      header.appendChild(time);
      
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = text;
      
      content.appendChild(header);
      content.appendChild(bubble);
      
      message.appendChild(avatar);
      message.appendChild(content);
      
      return message;
    }

    function addMessage(text, isUser = false) {
      const message = createMessage(text, isUser);
      messagesContainer.appendChild(message);
      scrollToBottom();
      
      state.messages.push({
        text,
        isUser,
        timestamp: new Date().toISOString()
      });
    }

    function scrollToBottom() {
      setTimeout(() => {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }, 100);
    }

    function showTyping() {
      state.isTyping = true;
      typingIndicator.classList.add('active');
      scrollToBottom();
    }

    function hideTyping() {
      state.isTyping = false;
      typingIndicator.classList.remove('active');
    }

    function showNotification(text, type = 'success') {
      notificationText.textContent = text;
      notification.className = 'notification show ' + type;
      
      const icon = notification.querySelector('i');
      icon.setAttribute('data-lucide', type === 'success' ? 'check-circle' : 'alert-circle');
      lucide.createIcons();
      
      setTimeout(() => {
        notification.classList.remove('show');
      }, 3000);
    }

    async function sendMessage(text) {
      if (!text.trim()) return;
      
      addMessage(text, true);
      messageInput.value = '';
      adjustTextareaHeight();
      
      showTyping();
      sendBtn.classList.add('loading');
      
      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            userMessage: text,
            timestamp: new Date().toISOString(),
            source: 'SABRINA_CHAT_INTERFACE',
            sessionId: Date.now().toString()
          })
        });
        
        const data = await response.json();
        
        setTimeout(() => {
          hideTyping();
          const replyText = data.reply || data.message || 'Message bien reçu ! Je traite votre demande.';
          addMessage(replyText, false);
          showNotification('Message envoyé avec succès', 'success');
        }, 1000 + Math.random() * 1000);
        
      } catch (error) {
        console.error('Erreur:', error);
        hideTyping();
        addMessage('Désolé, une erreur est survenue. Veuillez réessayer.', false);
        showNotification('Erreur de connexion', 'error');
      } finally {
        sendBtn.classList.remove('loading');
      }
    }

    function adjustTextareaHeight() {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
    }

    messageInput.addEventListener('input', adjustTextareaHeight);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(messageInput.value);
      }
    });

    sendBtn.addEventListener('click', () => {
      sendMessage(messageInput.value);
    });

    themeToggle.addEventListener('click', toggleTheme);

    document.querySelectorAll('.quick-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const message = chip.getAttribute('data-message');
        messageInput.value = message;
        adjustTextareaHeight();
        messageInput.focus();
      });
    });

    document.getElementById('searchBtn').addEventListener('click', () => {
      showNotification('Fonction de recherche bientôt disponible', 'success');
    });

    document.getElementById('notificationBtn').addEventListener('click', () => {
      showNotification('Aucune nouvelle notification', 'success');
    });

    document.getElementById('attachBtn').addEventListener('click', () => {
      showNotification('Fonctionnalité de pièce jointe bientôt disponible', 'success');
    });

    document.getElementById('emojiBtn').addEventListener('click', () => {
      showNotification('Sélecteur d\'emoji bientôt disponible', 'success');
    });

    initTheme();
    lucide.createIcons();
    messageInput.focus();
    scrollToBottom();
  </script>
</body>
