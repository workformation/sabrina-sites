<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <!-- SABRINA SEO Metadata -->
    <meta name="description" content="Test - Site professionnel créé avec SABRINA Web Studio">
    <meta name="author" content="SABRINA Web Studio">
    <meta name="generator" content="SABRINA v3.2 ULTRA PRO">
    <meta property="og:title" content="Test">
    <meta property="og:description" content="Test - Site professionnel créé avec SABRINA Web Studio">

    <meta name="twitter:card" content="summary_large_image">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Technique | SABRINA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --primary: #1E3A5F;
      --accent: #3B82F6;
      --bg: #0A0E1A;
      --surface: #111827;
      --text: #F9FAFB;
      --text-dim: #9CA3AF;
      --border: rgba(59, 130, 246, 0.1);
      --success: #10B981;
      --error: #EF4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #0F172A 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .glass {
      background: rgba(17, 24, 39, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(30, 58, 95, 0.1);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.25rem;
      position: relative;
      animation: float 3s ease-in-out infinite;
    }
    .avatar::after {
      content: '';
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 12px;
      height: 12px;
      background: var(--success);
      border-radius: 50%;
      border: 2px solid var(--bg);
      animation: pulse 2s ease-in-out infinite;
    }
    .header-info h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-dim);
      font-size: 0.875rem;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }
    .theme-toggle:hover {
      background: rgba(59, 130, 246, 0.1);
      border-color: var(--accent);
    }
    #messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    #messages-container::-webkit-scrollbar { width: 6px; }
    #messages-container::-webkit-scrollbar-track { background: transparent; }
    #messages-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    .message {
      display: flex;
      gap: 1rem;
      animation: fadeInUp 0.4s ease;
      opacity: 0;
      animation-fill-mode: forwards;
    }
    .message:nth-child(1) { animation-delay: 0.1s; }
    .message:nth-child(2) { animation-delay: 0.2s; }
    .message:nth-child(3) { animation-delay: 0.3s; }
    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.875rem;
    }
    .message-content {
      flex: 1;
      max-width: 70%;
    }
    .message-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .message-name {
      font-weight: 600;
      font-size: 0.875rem;
    }
    .message-time {
      font-size: 0.75rem;
      color: var(--text-dim);
    }
    .message-bubble {
      background: var(--surface);
      padding: 1rem 1.25rem;
      border-radius: 16px;
      border: 1px solid var(--border);
      line-height: 1.6;
    }
    .message.user {
      flex-direction: row-reverse;
    }
    .message.user .message-content {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    .message.user .message-bubble {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none;
    }
    .message.user .message-avatar {
      background: rgba(59, 130, 246, 0.2);
    }
    #typing-indicator {
      display: none;
      align-items: center;
      gap: 1rem;
      padding: 0 1.5rem;
    }
    #typing-indicator.active { display: flex; }
    .typing-dots {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.25rem;
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
    }
    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    #input-bar {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      background: rgba(17, 24, 39, 0.6);
      backdrop-filter: blur(20px);
    }
    .input-wrapper {
      display: flex;
      gap: 1rem;
      align-items: flex-end;
      max-width: 1200px;
      margin: 0 auto;
    }
    #message-input {
      flex: 1;
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--text);
      padding: 1rem 1.25rem;
      border-radius: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      resize: none;
      min-height: 56px;
      max-height: 120px;
      transition: all 0.3s ease;
    }
    #message-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }
    #send-btn {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none;
      color: white;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    #send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
    }
    #send-btn:active { transform: translateY(0); }
    #send-btn.loading {
      pointer-events: none;
      opacity: 0.6;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    [data-theme="light"] {
      --bg: #F9FAFB;
      --surface: #FFFFFF;
      --text: #111827;
      --text-dim: #6B7280;
      --border: rgba(30, 58, 95, 0.1);
    }
    @media (max-width: 768px) {
      header { padding: 1rem; }
      #messages-container { padding: 1.5rem 1rem; }
      .message-content { max-width: 85%; }
      #input-bar { padding: 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="avatar">S</div>
      <div class="header-info">
        <h1>Support Technique</h1>
        <div class="status">
          <span class="status-dot"></span>
          <span>En ligne</span>
        </div>
      </div>
    </div>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
      <i data-lucide="moon" width="20" height="20"></i>
    </button>
  </header>
  <div id="messages-container">
    <div class="message bot">
      <div class="message-avatar">S</div>
      <div class="message-content">
        <div class="message-header">
          <span class="message-name">SABRINA</span>
          <span class="message-time">Maintenant</span>
        </div>
        <div class="message-bubble">
          Bonjour ! Je suis SABRINA, votre assistante support technique. Comment puis-je vous aider aujourd'hui ?
        </div>
      </div>
    </div>
  </div>
  <div id="typing-indicator">
    <div class="message-avatar">S</div>
    <div class="typing-dots">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>
  <div id="input-bar">
    <div class="input-wrapper">
      <textarea id="message-input" placeholder="Décrivez votre problème..." rows="1"></textarea>
      <button id="send-btn" aria-label="Envoyer">
        <i data-lucide="send" width="24" height="24"></i>
      </button>
    </div>
  </div>
  <script>
    const WEBHOOK_URL = 'https://n8n.srv1121126.hstgr.cloud/webhook/sabrina';
    const messagesContainer = document.getElementById('messages-container');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');
    const themeToggle = document.getElementById('theme-toggle');
    
    lucide.createIcons();
    
    function autoResize() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    }
    messageInput.addEventListener('input', autoResize);
    
    function addMessage(text, isUser = false) {
      const message = document.createElement('div');
      message.className = `message ${isUser ? 'user' : 'bot'}`;
      const time = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      message.innerHTML = `
        <div class="message-avatar">${isUser ? 'U' : 'S'}</div>
        <div class="message-content">
          <div class="message-header">
            <span class="message-name">${isUser ? 'Vous' : 'SABRINA'}</span>
            <span class="message-time">${time}</span>
          </div>
          <div class="message-bubble">${text}</div>
        </div>
      `;
      messagesContainer.appendChild(message);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      addMessage(text, true);
      messageInput.value = '';
      messageInput.style.height = 'auto';
      sendBtn.classList.add('loading');
      typingIndicator.classList.add('active');
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userMessage: text,
            timestamp: new Date().toISOString(),
            source: 'SUPPORT_CHAT'
          })
        });
        const data = await response.json();
        setTimeout(() => {
          typingIndicator.classList.remove('active');
          addMessage(data.reply || "Message reçu ! Je traite votre demande.");
          sendBtn.classList.remove('loading');
        }, 1500);
      } catch (error) {
        typingIndicator.classList.remove('active');
        addMessage("Erreur de connexion. Veuillez réessayer.", false);
        sendBtn.classList.remove('loading');
      }
    }
    
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    themeToggle.addEventListener('click', () => {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', newTheme);
      const icon = themeToggle.querySelector('i');
      icon.setAttribute('data-lucide', newTheme === 'dark' ? 'moon' : 'sun');
      lucide.createIcons();
    });
  </script>
</body>
</html>
